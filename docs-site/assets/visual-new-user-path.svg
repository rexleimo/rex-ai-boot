<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
<title id="title">RexCLI 新手三步路径</title><desc id="desc">安装并运行 Doctor，启用项目记忆，再按需开启多 Agent。</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fbff"/><stop offset="1" stop-color="#eaf4ff"/></linearGradient>
  <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1a73e8"/><stop offset="1" stop-color="#00a884"/></linearGradient>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#174ea6" flood-opacity="0.14"/></filter>
  <style>
    .title{font:700 30px 'Google Sans','Segoe UI',Arial,sans-serif;fill:#172033}.subtitle{font:500 16px 'Google Sans Text','Segoe UI',Arial,sans-serif;fill:#5f6b7a}.label{font:700 17px 'Google Sans','Segoe UI',Arial,sans-serif;fill:#1f2937}.small{font:500 13px 'Roboto Mono','SFMono-Regular',monospace;fill:#536271}.tiny{font:600 12px 'Google Sans Text','Segoe UI',Arial,sans-serif;fill:#657285}.card{fill:#fff;stroke:#d7e3f3;stroke-width:1.2;filter:url(#shadow)}.terminal{fill:#101820}.termText{font:500 13px 'Roboto Mono','SFMono-Regular',monospace;fill:#dce7f7}.green{fill:#16a34a}.blue{fill:#1a73e8}.amber{fill:#f59e0b}.red{fill:#ef4444}.muted{fill:#edf4fb;stroke:#d7e3f3;stroke-width:1}.line{stroke:#9ab5d5;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}.arrow{marker-end:url(#arrow)}
  </style>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6c8fb8"/></marker>
</defs>
<rect width="1200" height="640" rx="34" fill="url(#bg)"/>
<text x="70" y="78" class="title">3 分钟跑通 RexCLI</text>
<text x="70" y="108" class="subtitle">先跑通最短路径，再按需打开多 Agent 和高级门禁。</text>
<path d="M245 326 H954" class="line arrow"/>
<g transform="translate(70,170)"><rect class="card" width="285" height="280" rx="26"/><circle cx="54" cy="55" r="24" fill="#e8f0fe"/><text x="46" y="63" class="label" fill="#1a73e8">1</text><text x="92" y="62" class="label">安装 + Doctor</text><rect x="34" y="96" width="216" height="90" rx="14" class="terminal"/><circle cx="55" cy="116" r="5" fill="#ff5f56"/><circle cx="73" cy="116" r="5" fill="#ffbd2e"/><circle cx="91" cy="116" r="5" fill="#27c93f"/><text x="50" y="148" class="termText">$ aios</text><text x="50" y="170" class="termText">Setup → Doctor</text><text x="34" y="226" class="small">目标：关键错误为 0</text></g>
<g transform="translate(458,170)"><rect class="card" width="285" height="280" rx="26"/><circle cx="54" cy="55" r="24" fill="#e6f4ea"/><text x="46" y="63" class="label" fill="#16a34a">2</text><text x="92" y="62" class="label">开启项目记忆</text><rect x="34" y="96" width="216" height="90" rx="14" fill="#f4f8fc" stroke="#d7e3f3"/><text x="54" y="130" class="small">touch .contextdb-enable</text><text x="54" y="158" class="small">codex / claude / gemini</text><path d="M72 214 C120 190 166 190 214 214" class="line"/><circle cx="72" cy="214" r="13" class="blue"/><circle cx="143" cy="198" r="13" class="green"/><circle cx="214" cy="214" r="13" fill="#7c3aed"/><text x="34" y="246" class="small">同一个项目，共享上下文</text></g>
<g transform="translate(846,170)"><rect class="card" width="285" height="280" rx="26"/><circle cx="54" cy="55" r="24" fill="#fff7ed"/><text x="46" y="63" class="label" fill="#f59e0b">3</text><text x="92" y="62" class="label">按需开 Team</text><rect x="34" y="96" width="216" height="90" rx="14" class="terminal"/><text x="50" y="130" class="termText">$ aios team 3:codex</text><text x="50" y="154" class="termText">$ aios team status</text><rect x="45" y="212" width="185" height="13" rx="7" fill="#dbeafe"/><rect x="45" y="212" width="126" height="13" rx="7" fill="#1a73e8"/><text x="34" y="246" class="small">只在任务可拆时使用</text></g>
<text x="70" y="560" class="subtitle">口诀：不确定就先用单 Agent；能拆、边界清楚、验收明确时再用 team。</text>
</svg>
