site_name: rex-ai-boot Documentation
site_url: https://cli.rexai.top
site_description: Local-first multi-CLI agent workflow docs for Codex CLI, Claude Code, Gemini CLI, and OpenCode skills sync.
site_author: RexAI
repo_url: https://github.com/rexleimo/rex-ai-boot
repo_name: rexleimo/rex-ai-boot

docs_dir: docs-site
site_dir: site

theme:
  name: material
  custom_dir: docs-site/overrides
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang:
        - en
        - zh
        - ja
        - ko
  - i18n:
      docs_structure: folder
      reconfigure_material: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
          site_name: rex-ai-boot Documentation
          site_description: Local-first multi-CLI agent workflow docs for Codex CLI, Claude Code, Gemini CLI, and OpenCode skills sync.
        - locale: zh
          name: 简体中文
          build: true
          site_name: rex-ai-boot 文档
          site_description: 面向 Codex CLI、Claude Code、Gemini CLI 及 OpenCode skills 同步的本地优先多 CLI 智能体工作流文档。
          nav_translations:
            Overview: 概览
            Project: 项目地址
            Blog: 博客
            Friends: 友情链接
            Quick Start: 快速开始
            Changelog: 更新日志
            CLI Workflows: CLI 工作流
            Case Library: 官方案例库
            Architecture: 架构
            ContextDB: ContextDB
            Troubleshooting: 故障排查
        - locale: ja
          name: 日本語
          build: true
          site_name: rex-ai-boot ドキュメント
          site_description: Codex CLI、Claude Code、Gemini CLI と OpenCode skills 同期向けのローカルファーストなマルチ CLI エージェント運用ドキュメント。
          nav_translations:
            Overview: 概要
            Project: プロジェクト
            Blog: ブログ
            Friends: リンク集
            Quick Start: クイックスタート
            Changelog: 変更履歴
            CLI Workflows: CLI ワークフロー
            Case Library: 公式ケースライブラリ
            Architecture: アーキテクチャ
            ContextDB: ContextDB
            Troubleshooting: トラブルシューティング
        - locale: ko
          name: 한국어
          build: true
          site_name: rex-ai-boot 문서
          site_description: Codex CLI, Claude Code, Gemini CLI와 OpenCode skills 동기화를 위한 로컬 우선 멀티 CLI 에이전트 워크플로 문서.
          nav_translations:
            Overview: 개요
            Project: 프로젝트
            Blog: 블로그
            Friends: 추천 링크
            Quick Start: 빠른 시작
            Changelog: 변경 로그
            CLI Workflows: CLI 워크플로
            Case Library: 공식 사례 라이브러리
            Architecture: 아키텍처
            ContextDB: ContextDB
            Troubleshooting: 문제 해결

extra:
  links:
    product: https://cli.rexai.top
    blog: https://cli.rexai.top/blog/
    tools: https://tool.rexai.top
  footer_links:
    - text: os.rexai.top (RexOS Agent OS)
      href: https://os.rexai.top
      title: RexOS AI Agent OS focused on harness-first long-running workflows
    - text: rexai.top (Content Hub)
      href: https://rexai.top
      title: RexAI content hub for AI engineering articles and tutorials
    - text: tool.rexai.top (Free Tools)
      href: https://tool.rexai.top
      title: RexAI free no-ad online tools portal

extra_javascript:
  - assets/analytics-placeholder.js

extra_css:
  - assets/custom.css

nav:
  - Overview: index.md
  - Blog: https://cli.rexai.top/blog/
  - Friends: friends.md
  - Project: https://github.com/rexleimo/rex-ai-boot
  - Quick Start: getting-started.md
  - Changelog: changelog.md
  - CLI Workflows: use-cases.md
  - Case Library: case-library.md
  - Architecture: architecture.md
  - ContextDB: contextdb.md
  - Troubleshooting: troubleshooting.md
